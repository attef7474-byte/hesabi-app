name: Build Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  android-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.10.2

      - name: Build signed release APK
        run: gradle :app:assembleRelease --no-daemon

      - name: Prepare APK
        run: |
          mkdir -p release
          cp app/build/outputs/apk/release/app-release.apk release/hesabi-app-latest.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: hesabi-app-latest-apk
          path: release/hesabi-app-latest.apk

      - name: Publish latest Android release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete latest-android -y --cleanup-tag || true
          git tag -f latest-android
          git push -f origin latest-android
          gh release create latest-android release/hesabi-app-latest.apk \
            --title "Hesabi Android Latest" \
            --notes "آخر APK موقّع تلقائيًا من فرع main. افتح الرابط من الهاتف وحمّل hesabi-app-latest.apk ثم ثبته." \
            --latest
